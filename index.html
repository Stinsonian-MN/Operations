<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stinson Services — Fleet Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px}
a{color:inherit;text-decoration:none}

/* Layout */
.shell{display:flex;min-height:100vh}
.sidebar{width:260px;flex-shrink:0;background:#fff;border-right:1px solid #e8e6e0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;min-width:0;padding:28px 32px}

/* Sidebar */
.sb-header{padding:18px 16px 12px;border-bottom:1px solid #e8e6e0}
.sb-logo{font-size:15px;font-weight:600;color:#1a1a18;letter-spacing:-0.2px}
.sb-sub{font-size:11px;color:#888780;margin-top:2px}
.sb-section{padding:8px 10px 4px;font-size:10px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:0.06em;margin-top:8px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;cursor:pointer;margin:1px 6px;transition:background 0.1s}
.sb-item:hover{background:#f5f4f0}
.sb-item.active{background:#eeedfe;color:#3C3489}
.sb-item.active .sb-name{color:#3C3489;font-weight:500}
.sb-item.active .sb-badge{background:#3C3489;color:#fff}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-red{background:#E24B4A}.dot-amber{background:#EF9F27}.dot-green{background:#639922}.dot-blue{background:#378ADD}.dot-gray{background:#888780}
.sb-name{font-size:13px;color:#444441;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-badge{font-size:10px;padding:2px 6px;border-radius:4px;background:#f1efe8;color:#5f5e5a;white-space:nowrap}
.sb-divider{height:1px;background:#e8e6e0;margin:8px 16px}

/* Page header */
.page-title{font-size:22px;font-weight:600;color:#1a1a18;margin-bottom:4px}
.page-sub{font-size:13px;color:#888780;margin-bottom:24px}

/* Metric strip */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:28px}
.metric{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:14px 16px}
.metric-label{font-size:11px;color:#888780;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600;color:#1a1a18}
.metric-value.red{color:#A32D2D}.metric-value.amber{color:#854F0B}.metric-value.green{color:#3B6D11}.metric-value.blue{color:#185FA5}

/* Fleet grid */
.fleet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.veh-card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:16px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s}
.veh-card:hover{border-color:#AFA9EC;box-shadow:0 2px 8px rgba(83,74,183,0.08)}
.veh-card.alert-red{border-left:3px solid #E24B4A}
.veh-card.alert-amber{border-left:3px solid #EF9F27}
.veh-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.veh-name{font-size:14px;font-weight:600;color:#1a1a18;line-height:1.3}
.veh-sub{font-size:12px;color:#888780;margin-top:2px}
.badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.badge-red{background:#FCEBEB;color:#791F1F}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-green{background:#EAF3DE;color:#27500A}
.badge-blue{background:#E6F1FB;color:#0C447C}
.badge-gray{background:#F1EFE8;color:#5F5E5A}
.veh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;border-top:1px solid #f1efe8;padding-top:10px;margin-top:4px}
.vs-item{display:flex;flex-direction:column;gap:2px}
.vs-label{font-size:10px;color:#888780}
.vs-val{font-size:13px;font-weight:500;color:#1a1a18}

/* Detail view */
.detail-back{display:flex;align-items:center;gap:8px;cursor:pointer;color:#888780;font-size:13px;margin-bottom:20px;width:fit-content}
.detail-back:hover{color:#1a1a18}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.detail-title{font-size:20px;font-weight:600;color:#1a1a18}
.detail-meta{font-size:13px;color:#888780;margin-top:3px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr}.shell{flex-direction:column}.sidebar{width:100%;height:auto;position:static}}

/* Sections */
.section{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:20px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px}

/* History table */
.hist-table{width:100%;border-collapse:collapse;table-layout:fixed}
.hist-table th{font-size:11px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:0.04em;padding:0 8px 8px 0;text-align:left;border-bottom:1px solid #e8e6e0}
.hist-table td{padding:8px 8px 8px 0;border-bottom:1px solid #f5f4f0;font-size:13px;vertical-align:top}
.hist-table tr:last-child td{border-bottom:none}
.hist-date{color:#888780;white-space:nowrap;width:80px}
.hist-mi{color:#888780;text-align:right;white-space:nowrap;width:70px}
.hist-cost{text-align:right;white-space:nowrap;width:72px;font-weight:500}
.hist-desc{color:#1a1a18;word-break:break-word}
.cost-purchase{color:#185FA5}
.cost-repair{color:#1a1a18}

/* Mileage bar */
.mi-bar-wrap{margin:12px 0}
.mi-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:#888780;margin-bottom:4px}
.mi-bar-bg{height:8px;background:#f1efe8;border-radius:4px;overflow:hidden}
.mi-bar-fill{height:100%;border-radius:4px;background:#7F77DD;transition:width 0.3s}
.mi-bar-fill.warn{background:#EF9F27}
.mi-bar-fill.danger{background:#E24B4A}
.mi-annual{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:12px}
.mi-yr{background:#f5f4f0;border-radius:8px;padding:8px 10px}
.mi-yr-label{font-size:10px;color:#888780}
.mi-yr-val{font-size:14px;font-weight:600;color:#1a1a18}

/* Recommended maintenance */
.maint-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f5f4f0}
.maint-item:last-child{border-bottom:none}
.maint-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.icon-red{background:#FCEBEB;color:#791F1F}
.icon-amber{background:#FAEEDA;color:#633806}
.icon-green{background:#EAF3DE;color:#27500A}
.icon-blue{background:#E6F1FB;color:#0C447C}
.maint-body{flex:1}
.maint-name{font-size:13px;font-weight:500;color:#1a1a18}
.maint-note{font-size:12px;color:#888780;margin-top:2px}
.maint-due{font-size:11px;font-weight:600;margin-top:4px}
.due-red{color:#A32D2D}.due-amber{color:#854F0B}.due-green{color:#3B6D11}

/* Open items */
.open-item{background:#fffbf0;border:1px solid #FAC775;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.open-item.urgent{background:#fff5f5;border-color:#F09595}
.open-item-title{font-size:13px;font-weight:500;color:#1a1a18}
.open-item-meta{font-size:12px;color:#888780;margin-top:2px}

/* Tabs in detail */
.dtabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid #e8e6e0;padding-bottom:-1px}
.dtab{font-size:13px;padding:8px 14px;cursor:pointer;border-bottom:2px solid transparent;color:#888780;margin-bottom:-1px;transition:color 0.1s,border-color 0.1s}
.dtab:hover{color:#1a1a18}
.dtab.active{color:#534AB7;border-bottom-color:#534AB7;font-weight:500}
.dtab-pane{display:none}
.dtab-pane.active{display:block}

/* Total spent */
.total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:2px solid #e8e6e0;margin-top:8px;font-weight:600;font-size:14px}
</style>
</head>

<div class="shell">

  </div>
  <div style="height:16px"></div>
</nav>

<main class="main" id="main-area">
  <div id="fleet-view"></div>
  <div id="detail-view" style="display:none"></div>
</main>
</div>

function statusColor(s){return s==='danger'?'#E24B4A':s==='amber'?'EF9F27':s==='green'?'#639922':'#378ADD'}
function dotClass(s){return s==='danger'?'dot-red':s==='amber'?'dot-amber':s==='green'?'dot-green':'dot-blue'}
function badgeClass(s){return s==='danger'?'badge-red':s==='amber'?'badge-amber':s==='green'?'badge-green':'badge-blue'}
function cardClass(s){return s==='danger'?'veh-card alert-red':s==='amber'?'veh-card alert-amber':'veh-card'}

function priorityIcon(p){
  if(p==='danger')return{cls:'icon-red',txt:'!'};
  if(p==='amber')return{cls:'icon-amber',txt:'~'};
  if(p==='blue')return{cls:'icon-blue',txt:'i'};
  return{cls:'icon-green',txt:'✓'};
}
function dueClass(p){return p==='danger'?'due-red':p==='amber'?'due-amber':p==='blue'?'':' due-green'}

function calcPct(last,next,curr){
  if(!last||!next)return null;
  const pct=Math.round(((curr-last)/(next-last))*100);
  return Math.min(pct,100);
}

let currentVehicle=null;
let currentTab='history';

function buildSidebar(){
  const el=document.getElementById('sb-vehicles');
  el.innerHTML=VEHICLES.map(v=>`
    <div class="sb-item" id="sb-${v.id}" onclick="showDetail('${v.id}')">
      <div class="sb-dot ${dotClass(v.status)}"></div>
      <span class="sb-name">${v.short}</span>
      <span class="sb-badge">${v.plate}</span>
    </div>`).join('');
}

function showFleet(){
  currentVehicle=null;
  document.getElementById('fleet-view').style.display='';
  document.getElementById('detail-view').style.display='none';
  document.querySelectorAll('.sb-item').forEach(e=>e.classList.remove('active'));
  document.getElementById('nav-fleet').classList.add('active');
  renderFleet();
}

function renderFleet(){
  const alertCount=VEHICLES.filter(v=>v.status==='danger').length;
  const warnCount=VEHICLES.filter(v=>v.status==='amber').length;
  const totalInvest=VEHICLES.reduce((s,v)=>s+(v.purchase||0),0);
  const totalMi=VEHICLES.reduce((s,v)=>s+(v.mileage||0),0);

  document.getElementById('fleet-view').innerHTML=`
    <div class="page-title">Fleet overview</div>
    <div class="page-sub">Stinson Services · ${VEHICLES.length} active vehicles · As of Apr 2026</div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Active vehicles</div><div class="metric-value">${VEHICLES.length}</div></div>
      <div class="metric"><div class="metric-label">Immediate alerts</div><div class="metric-value red">${alertCount}</div></div>
      <div class="metric"><div class="metric-label">Monitor / watch</div><div class="metric-value amber">${warnCount}</div></div>
      <div class="metric"><div class="metric-label">Total fleet miles</div><div class="metric-value">${Math.round(totalMi/1000)}k</div></div>
      <div class="metric"><div class="metric-label">Fleet investment</div><div class="metric-value blue">$${Math.round(totalInvest/1000)}k</div></div>
    </div>
    <div class="fleet-grid">
      ${VEHICLES.map(v=>`
        <div class="${cardClass(v.status)}" onclick="showDetail('${v.id}')">
          <div class="veh-top">
            <div>
              <div class="veh-name">${v.name}</div>
              <div class="veh-sub">${v.plate} · ${v.driver}</div>
            </div>
            <span class="badge ${badgeClass(v.status)}">${v.statusLabel}</span>
          </div>
          <div class="veh-stats">
            <div class="vs-item"><div class="vs-label">Mileage</div><div class="vs-val">${fmtMi(v.mileage)}</div></div>
            <div class="vs-item"><div class="vs-label">Purchased</div><div class="vs-val">${fmt(v.purchase)}</div></div>
            <div class="vs-item"><div class="vs-label">Open items</div><div class="vs-val">${v.openItems.length}</div></div>
          </div>
        </div>`).join('')}
    </div>`;
}

function showDetail(id){
  currentVehicle=id;
  currentTab='history';
  document.getElementById('fleet-view').style.display='none';
  document.getElementById('detail-view').style.display='';
  document.querySelectorAll('.sb-item').forEach(e=>e.classList.remove('active'));
  const sbEl=document.getElementById('sb-'+id);
  if(sbEl)sbEl.classList.add('active');
  document.getElementById('nav-fleet').classList.remove('active');
  renderDetail(id, currentTab);
}

function switchTab(tab){
  currentTab=tab;
  renderDetail(currentVehicle, tab);
}

function renderDetail(id, tab){
  const v=VEHICLES.find(x=>x.id===id);
  if(!v)return;

  const totalSpent=v.history.reduce((s,h)=>s+(h.cost||0),0);
  const openUrgent=v.openItems.filter(x=>x.urgent).length;

  const histHTML=`
    <div class="section">
      <div class="section-title">Repair & service history</div>
      <div style="overflow-x:auto">
      <table class="hist-table">
        <thead><tr>
          <th style="width:78px">Date</th>
          <th>Description</th>
          <th style="width:68px;text-align:right">Mileage</th>
          <th style="width:72px;text-align:right">Cost</th>
        </tr></thead>
        <tbody>
          ${v.history.slice().reverse().map(h=>`
            <tr>
              <td class="hist-date">${h.date}</td>
              <td class="hist-desc">${h.desc}${h.type==='recall'?' <span class="badge badge-blue" style="font-size:10px">recall</span>':h.type==='warranty'?' <span class="badge badge-green" style="font-size:10px">warranty</span>':''}</td>
              <td class="hist-mi">${h.mi?h.mi.toLocaleString():'—'}</td>
              <td class="hist-cost ${h.type==='purchase'?'cost-purchase':'cost-repair'}">${h.cost!=null?fmt(h.cost):'—'}</td>
            </tr>`).join('')}
        </tbody>
      </table>
      </div>
      <div class="total-row">
        <span>Total invested (purchase + service)</span>
        <span>${fmt(totalSpent)}</span>
      </div>
    </div>`;

  const maxMi=Math.max(...v.mileageByYear.map(m=>m.mi));
  const miHTML=`
    <div class="section">
      <div class="section-title">Annual mileage</div>
      ${v.mileageByYear.map(m=>`
        <div class="mi-bar-wrap">
          <div class="mi-bar-labels"><span>${m.yr}</span><span>${m.mi.toLocaleString()} mi</span></div>
          <div class="mi-bar-bg"><div class="mi-bar-fill" style="width:${maxMi>0?Math.round((m.mi/maxMi)*100):0}%"></div></div>
        </div>`).join('')}
      <div style="margin-top:16px;padding-top:12px;border-top:1px solid #f1efe8;display:flex;justify-content:space-between;font-size:13px">
        <span style="color:#888780">Current odometer</span>
        <span style="font-weight:600">${fmtMi(v.mileage)}</span>
      </div>
    </div>`;

  const maintHTML=`
    <div class="section">
      <div class="section-title">Recommended maintenance schedule</div>
      ${v.maintenance.map(m=>{
        const icon=priorityIcon(m.priority);
        const pct=m.lastMi&&m.nextMi?calcPct(m.lastMi,m.nextMi,v.mileage):null;
        const barColor=m.priority==='danger'?'#E24B4A':m.priority==='amber'?'#EF9F27':m.priority==='blue'?'#378ADD':'#639922';
        return `<div class="maint-item">
          <div class="maint-icon ${icon.cls}">${icon.txt}</div>
          <div class="maint-body">
            <div class="maint-name">${m.name}</div>
            <div class="maint-note">${m.interval}${m.nextDue?' · Due: '+m.nextDue:m.nextMi?' · Next: '+m.nextMi.toLocaleString()+' mi':''}</div>
            ${pct!==null?`<div style="margin:6px 0 2px">
              <div class="mi-bar-bg" style="height:6px"><div class="mi-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
            </div>`:'' }
            <div class="maint-due ${dueClass(m.priority)}">${m.note}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;

  const openHTML=v.openItems.length>0?`
    <div class="section">
      <div class="section-title">Open service items</div>
      ${v.openItems.map(i=>`
        <div class="open-item ${i.urgent?'urgent':''}">
          <div class="open-item-title">${i.title}</div>
          <div class="open-item-meta">${i.note}</div>
        </div>`).join('')}
    </div>`:`
    <div class="section">
      <div class="section-title">Open service items</div>
      <div style="color:#888780;font-size:13px;padding:8px 0">No open items — vehicle is current.</div>
    </div>`;

  document.getElementById('detail-view').innerHTML=`
    <div class="detail-back" onclick="showFleet()">
      ← Back to fleet
    </div>
    <div class="detail-header">
      <div>
        <div class="detail-title">${v.name}</div>
        <div class="detail-meta">${v.plate} · ${v.vin} · ${v.driver} · ${v.location} · GPS: ${v.gps}</div>
      </div>
      <span class="badge ${badgeClass(v.status)}" style="font-size:13px;padding:5px 12px">${v.statusLabel}</span>
    </div>
    <div class="metrics" style="margin-bottom:20px">
      <div class="metric"><div class="metric-label">Current mileage</div><div class="metric-value">${fmtMi(v.mileage)}</div></div>
      <div class="metric"><div class="metric-label">Total invested</div><div class="metric-value blue">${fmt(totalSpent)}</div></div>
      <div class="metric"><div class="metric-label">Open items</div><div class="metric-value ${v.openItems.length>0?'amber':''}">${v.openItems.length}</div></div>
      <div class="metric"><div class="metric-label">Urgent items</div><div class="metric-value ${openUrgent>0?'red':''}">${openUrgent}</div></div>
      <div class="metric"><div class="metric-label">Year</div><div class="metric-value">${v.year}</div></div>
      <div class="metric"><div class="metric-label">Tire size</div><div class="metric-value" style="font-size:14px">${v.tires}</div></div>
    </div>
    <div class="dtabs">
      <div class="dtab ${tab==='history'?'active':''}" onclick="switchTab('history')">Service history</div>
      <div class="dtab ${tab==='mileage'?'active':''}" onclick="switchTab('mileage')">Mileage</div>
      <div class="dtab ${tab==='maintenance'?'active':''}" onclick="switchTab('maintenance')">Maintenance schedule</div>
      <div class="dtab ${tab==='open'?'active':''}" onclick="switchTab('open')">Open items ${v.openItems.length>0?'('+v.openItems.length+')':''}</div>
    </div>
    <div id="tab-history" class="dtab-pane ${tab==='history'?'active':''}">${histHTML}</div>
    <div id="tab-mileage" class="dtab-pane ${tab==='mileage'?'active':''}">${miHTML}</div>
    <div id="tab-maintenance" class="dtab-pane ${tab==='maintenance'?'active':''}">${maintHTML}</div>
    <div id="tab-open" class="dtab-pane ${tab==='open'?'active':''}">${openHTML}</div>
  `;
}

function sendQ(q){
  if(typeof sendPrompt==='function') sendPrompt(q);
}

buildSidebar();
showFleet();
</script>
</body>
</html>
